name: Build OpenWrt

on:
  push:
    branches:
      - main
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
          /usr/share/swift /usr/local/.ghcup /usr/local/share/boost /usr/local/julia* /opt/az
        if [ -f /swapfile ]; then
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
        fi
        sudo docker image prune --all --force
        echo "--- Disk usage after pruning preinstalled tools ---"
        df -hT
        echo "--------------------------------------------------"
        
        # 重新生成一个标准的 Ubuntu 22.04 sources.list 文件
        echo "deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list > /dev/null
        echo "deb http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list > /dev/null
        echo "deb http://archive.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list > /dev/null
        
        # 清理 APT 缓存，确保从头更新
        sudo apt-get clean
        
        sudo -E apt-get update # 确保这里是 update，而不是 install
        
        # --- 恢复你之前的依赖列表，并分批安装，以解决依赖冲突 ---
        # 核心编译工具和基础库
        sudo -E apt-get -qq install -f build-essential ccache git curl wget rsync bzip2 gzip unzip p7zip p7zip-full squashfs-tools zlib1g-dev python3 python3-setuptools libpython3-dev

        # 开发库和多架构支持
        sudo -E apt-get -qq install -f autoconf automake autopoint bison flex gawk gettext gcc-multilib g++-multilib \
          libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool swig

        # 其他工具和实用程序
        sudo -E apt-get -qq install -f ack antlr3 asciidoc binutils cmake cpio device-tree-compiler fastjar \
          gperf haveged help2man intltool lrzsz mkisofs msmtp ninja-build patch pkgconf \
          python3-pyelftools qemu-utils scons subversion texinfo uglifyjs upx-ucl vim xxd xmlto
        
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        
        # 添加df -h在初始化环境后，检查磁盘空间
        echo "--- Disk usage after environment initialization ---"
        df -hT
        echo "---------------------------------------------------"
        
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        echo "--- Disk usage after cloning source code ---"
        df -hT
        echo "--------------------------------------------"

    # --- 再次添加 Cache downloads 步骤，解决磁盘空间不足 ---
    - name: Cache downloads
      uses: actions/cache@v4 # 确保使用 v4 或最新版本
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-lede-dl-${{ hashFiles('openwrt/feeds.conf.default') }}-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ runner.os }}-lede-dl-
        enableCrossOsArchive: true # 建议添加此行

    # Cache the ccache directory so toolchain/GCC/V8 object files survive across
    # runs. Keyed by run number with a restore-key prefix so each run loads the
    # most recent cache and then saves an updated one (rolling cache).
    - name: Restore ccache
      id: restore-ccache
      uses: actions/cache/restore@v4
      with:
        path: openwrt/.ccache
        key: ${{ runner.os }}-lede-ccache-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-lede-ccache-
        enableCrossOsArchive: true

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Validate node version selection
      run: |
        set -e
        # node 16.x is EOL and its bundled V8 fails under gcc 13 (missing <cstdint>
        # and bundled-openssl header path breakage). We build node 20.x (Active LTS)
        # instead: it declares +libopenssl and builds clean on gcc 13 with no patch
        # hacks. Assert the config actually selects 20.x so a stray defconfig flip
        # back to 16 fails loudly here rather than mid-compile.
        grep -q '^CONFIG_NODEJS_20=y' "$GITHUB_WORKSPACE/.config"
        ! grep -q '^CONFIG_NODEJS_16=y' "$GITHUB_WORKSPACE/.config"

    - name: Validate custom packages
      run: |
        test -d openwrt/package/luci-app-syncdial
        test -d openwrt/package/luci-app-unblockneteasemusic
        grep -q '^CONFIG_PACKAGE_luci-app-syncdial=y' .config
        grep -q '^CONFIG_PACKAGE_luci-app-mwan3helper=y' .config
        grep -q '^CONFIG_PACKAGE_luci-app-unblockneteasemusic=y' .config
        ! grep -q '^CONFIG_PACKAGE_UnblockNeteaseMusic=y' .config
        ! grep -q '^CONFIG_PACKAGE_UnblockNeteaseMusic-Go=y' .config
        ! grep -q '^CONFIG_PACKAGE_luci-i18n-unblockneteasemusic-zh-cn=y' .config
        ! grep -q '^CONFIG_PACKAGE_luci-theme-opentomcat=y' .config
        ! test -d openwrt/package/luci-theme-opentomcat
        ! test -d openwrt/package/luci-theme-opentopd
        ! test -d openwrt/package/luci-theme-design
        ! test -d openwrt/package/luci-theme-edge
        ! test -d openwrt/package/luci-theme-neobird
        # Official JS UnblockNeteaseMusic LuCI app depends on node (runtime to run app.js).
        grep -q '^LUCI_TITLE:=LuCI support for UnblockNeteaseMusic (JavaScript)' openwrt/package/luci-app-unblockneteasemusic/Makefile
        grep -q '^LUCI_DEPENDS:=.*+node' openwrt/package/luci-app-unblockneteasemusic/Makefile
        # make sure no stray Go-variant snuck in
        ! test -d openwrt/package/unblockneteasemusic-go-luci

    - name: Inject local custom packages
      run: |
        [ -d package ] && cp -a package/. openwrt/package/
        rm -rf openwrt/feeds/packages/net/frp
        [ -d openwrt/package/custom/frp ] && sed -n '1,20p' openwrt/package/custom/frp/Makefile

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        # Enable ccache so the toolchain/GCC/V8 objects are cached across runs.
        # Biggest single speedup: without this every run recompiles the toolchain
        # from scratch (~1-2h). defconfig below keeps this symbol.
        grep -q '^CONFIG_CCACHE=y' openwrt/.config || echo 'CONFIG_CCACHE=y' >> openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Validate LuCI theme selection
      run: |
        set -e
        cd openwrt
        grep -q '^CONFIG_PACKAGE_luci-theme-bootstrap=y' .config
        grep -q '^CONFIG_PACKAGE_luci-theme-argon=y' .config
        ! grep -Eq '^CONFIG_PACKAGE_luci-theme-(opentopd|opentomcat|design|edge|neobird)=y' .config

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        # Remove obviously broken tiny download artifacts, but never touch Go module
        # cache files: valid Go source files can be smaller than 1 KiB.
        find dl -path 'dl/go-mod-cache' -prune -o -type f -size -1024c -exec ls -l {} \;
        find dl -path 'dl/go-mod-cache' -prune -o -type f -size -1024c -exec rm -f {} \;
        echo "--- Disk usage after downloading packages ---"
        df -hT
        echo "---------------------------------------------"

    - name: Preflight critical packages
      run: |
        set -e
        cd openwrt
        echo "--- Preflight bootstrap: tools + toolchain ---"
        make tools/install -j$(nproc) || make tools/install -j1 V=s
        make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s
        echo "--- Fast preflight: frp ---"
        if [ -d package/custom/frp ]; then
          make package/custom/frp/compile -j1 V=s
        elif [ -d package/frp ]; then
          make package/frp/compile -j1 V=s
        else
          make package/feeds/packages/frp/compile -j1 V=s
        fi
        echo "--- Preflight: node deps then node/V8 (biggest single cost; compile"
        echo "--- here so its objects land in ccache before the save point, even if"
        echo "--- the full firmware compile later hits the 6h timeout) ---"
        # Isolated `make <pkg>/compile` does NOT auto-build a package's deps, so
        # build node's heavy prerequisites explicitly first. node 20 links the
        # system openssl (+libopenssl); without this the V8/node compile dies on
        # 'openssl/opensslv.h: No such file'. zlib/nghttp2/libuv/c-ares round out
        # node's declared deps.
        for dep in package/libs/openssl package/libs/zlib \
                   feeds/packages/libs/libnghttp2 feeds/packages/libs/libuv \
                   feeds/packages/libs/c-ares; do
          if [ -d "$dep" ]; then
            make "$dep/compile" -j$(nproc) || make "$dep/compile" -j1 V=s
          fi
        done
        make package/feeds/packages/node/compile -j$(nproc) || make package/feeds/packages/node/compile -j1 V=s
        echo "--- ccache stats after preflight ---"
        ccache -s || true
        echo "--- Preflight OK ---"

    # Save ccache immediately after the expensive toolchain/preflight phase.
    # GitHub's normal post-job cache save does not run usefully when the later
    # full firmware compile hits the 6h job timeout/cancelled state, so saving
    # here makes the next run faster without changing firmware contents.
    - name: Save ccache after preflight
      uses: actions/cache/save@v4
      if: always()
      with:
        path: openwrt/.ccache
        key: ${{ runner.os }}-lede-ccache-${{ github.run_id }}
        enableCrossOsArchive: true

    - name: Compile the firmware
      id: compile
      run: |
        set -e
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        test -d bin/targets
        find bin/targets -type f \( -name '*.img.gz' -o -name '*.img' -o -name '*.bin' -o -name '*.efi' -o -name '*.gz' -o -name '*.manifest' \) | grep -q .
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "--- Disk usage after compiling firmware ---"
        df -hT
        echo "------------------------------------------"

    - name: Check space usage # 这一步你已有，但位置靠后，可作为最终检查
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        ls -lah
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Upload firmware to cowtransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true'
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress ${FIRMWARE} 2>&1 | tee cowtransfer.log
        echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
        echo "url=$(cat cowtransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Upload firmware to WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true'
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer wet -s -p 16 --no-progress ${FIRMWARE} 2>&1 | tee wetransfer.log
        echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
        echo "url=$(cat wetransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        # 确保这里只包含你有设置 env.UPLOAD_COWTRANSFER 和 env.UPLOAD_WETRANSFER 的部分
        [ ${UPLOAD_COWTRANSFER} = true ] && echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
        [ ${UPLOAD_WETRANSFER} = true ] && echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: GitRML/delete-workflow-runs@main # 修复此处，原为 Mattraks/delete-workflow-runs@main，P3TERX 模板现在是 GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.1.0 # P3TERX 模板现在用的是 @master，你这里用 @v0.1.0 也可以，但建议统一
      if: steps.tag.outputs.status == 'success'
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
